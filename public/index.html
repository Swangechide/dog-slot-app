<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>犬スロット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐶 犬スロット 🐶</h1>
        <div class="slot-machine">
            <div class="reel">
                <img id="img1" src="https://via.placeholder.com/200?text=?" alt="dog">
                <p id="name1" class="breed-name">-</p> </div>
            <div class="reel">
                <img id="img2" src="https://via.placeholder.com/200?text=?" alt="dog">
                <p id="name2" class="breed-name">-</p> </div>
            <div class="reel">
                <img id="img3" src="https://via.placeholder.com/200?text=?" alt="dog">
                <p id="name3" class="breed-name">-</p> </div>
        </div>
        
        <div id="result-message" class="message">ボタンを押せ！</div>
        <button id="spin-btn">スロットを回せ！</button>
    </div>

    <div class="counter-container">
        <h3>🏆 当たり回数</h3>
        <ul id="win-counts">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
